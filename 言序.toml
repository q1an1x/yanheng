[包]
格式 = 2
名称 = "yanheng"
版本 = "1.0.0-beta.1"
言序 = ">=1.1.15"
入口 = "src/主.yx"
说明 = "言衡：面向 sub2api 的麦金塔菜单栏账号与用量监控工具"
许可 = "MIT"
作者 = ["q1an1x"]

[依赖]
macos-ui = { 包 = "yanxu-macos-ui", git = "https://github.com/yanxulang/yanxu-macos-ui.git", 修订 = "v0.8.2", 版 = "^0.8" }
request = { 包 = "言访", git = "https://github.com/yanxulang/yanxu-request.git", 修订 = "v1.0.0", 版 = "^1.0" }
datetime = { 包 = "言时", git = "https://github.com/yanxulang/yanxu-datetime.git", 修订 = "v1.0.0", 版 = "^1.0" }

[应用]
类型 = "图形"
名称 = "言衡"
标识 = "dev.yanxu.yanheng"
版本 = "1.0.0-beta.1"
公司 = "Yanxu"
最低系统版本 = "13.0"
图标 = "assets/AppIcon.png"

[应用.窗口]
宽 = 420
高 = 680
最小宽 = 360
最小高 = 520
可缩放 = true
高分屏 = true

[权限]
文件 = []
网络 = ["*"]
本地网络 = true
TCP监听 = []
UDP绑定 = []
环境 = []
进程 = true
原生扩展 = true
图形界面 = true
剪贴板 = false
文件对话框 = false
系统通知 = false
托盘 = true
打开外部地址 = true
全局快捷键 = false

[导出]
默认 = "src/主.yx"

[资源]
目录 = ["assets"]

[构建]
目标 = "字节码"
